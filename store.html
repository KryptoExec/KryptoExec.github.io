<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silentware Store</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        h1 {
            color: #daa520;
        }
        .product {
            margin: 20px;
            padding: 20px;
            border: 1px solid #333;
            background: #1a1a1a;
            border-radius: 8px;
            display: inline-block;
            width: 200px;
        }
        .product img {
            max-width: 100%;
            height: auto;
            margin-bottom: 10px;
        }
        .product button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
        }
        .product button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Silentware Store</h1>
    <div class="product">
        <img src="product1-image-url" alt="Product 1">
        <h2>Product 1</h2>
        <p>$10.00</p>
        <button>Buy Now</button>
    </div>
    <div class="product">
        <img src="product2-image-url" alt="Product 2">
        <h2>Product 2</h2>
        <p>$15.00</p>
        <button>Buy Now</button>
    </div>
</body>
</html>
